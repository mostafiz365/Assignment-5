<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker | Home Page</title>
    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Tailwind & Daisy add code -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font Awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
<body class="bg-[#F8FAFC]">
    <header>
       <div class="navbar bg-base-100 shadow-sm px-20 flex flex-col sm:flex-row gap-5">
  <div class="flex-1">
    <div class="flex gap-1 items-center">
        <img class="w-9 h-9" src="assets/github-logo.png" alt="">
        <h2 class="text-2xl font-semibold text-[#1F2937]">GitHub Issues Tracker</h2>
    </div>
  </div>
  <div class="flex gap-2">
    <input id="input-search" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
      <button id="btn-search" class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
    </div>
  </div>

    </header>

    <main class="max-w-6xl mx-auto mt-16">
        <div id="all-buttons" class="bg-[#FFFFFF] flex gap-5 p-6 rounded-lg justify-center sm:justify-start">
            <button id="tab-all" onclick="toggle('all'); loadIssuesCard();" class="bg-blue-500 text-white border border-[#E4E4E7] py-2 px-6 rounded-md cursor-pointer">All</button>
            <button id="tab-open" onclick="toggle('open')" class="border border-[#E4E4E7] py-2 px-4 rounded-md cursor-pointer">Open</button>
            <button id="tab-closed" onclick="toggle('closed')" class="border border-[#E4E4E7] py-2 px-4 rounded-md cursor-pointer">Closed</button>
        </div>

        <section class="bg-[#FFFFFF] flex justify-between items-center mt-5 p-6 rounded-lg" >
            <div class="flex gap-1">
                <img class="w-12 h-12" src="assets/Aperture.png" alt="">
                <div>
                    <h5 class="font-semibold text-xl text-[#1F2937]"><span id="issue-count" class="font-semibold text-xl text-[#1F2937]">0</span> Issues</h5>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>

            </div>
            <div>
                <div class="flex flex-col sm:flex-row gap-4 items-start sm:items-center">
                    <div class="flex items-center gap-2">
    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
    <p>Open</p>
  </div>

  <div class="flex items-center gap-2">
    <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
    <p>Closed</p>
  </div>

</div>
            </div>
        </section>

        <section class="bg-[#FBFBFB] p-6">
            <div id="issues-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">    
            </div>

            <div id="loadingSpinner" class="h-[60vh] hidden flex justify-center items-center">
              <span class="loading loading-spinner loading-xl"></span>
            </div>
        </section>
    </main>

    <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="issues_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <div id="details-container">
    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>


    <script src="script/home.js"></script>
</body>
</html>
